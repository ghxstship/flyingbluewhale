openapi: 3.1.0
info:
  title: ATLVS API
  version: v1
  description: |
    Unified production platform API. Every response body follows the envelope
    in `components.schemas.ApiEnvelope`. Treat this file as the source of
    truth — a CI drift test (`tests/unit/openapi-drift.spec.ts`) asserts that
    every `src/app/api/v1/**/route.ts` handler exists in `paths` and vice
    versa. Add new routes here FIRST, then implement.

servers:
  - url: https://atlvs.pro
    description: Production
  - url: http://localhost:3000
    description: Local dev

security:
  - supabaseSession: []
  - bearerToken: []

components:
  securitySchemes:
    supabaseSession:
      type: apiKey
      in: cookie
      name: sb-xrovijzjbyssajhtwvas-auth-token
    bearerToken:
      type: http
      scheme: bearer
      bearerFormat: sk_<prefix>_<secret>
      description: |
        Org-scoped programmatic access token issued via
        `POST /api/v1/me/api-keys` or the console at `/console/settings/api`.
        The plaintext is returned ONCE at creation. Pass as
        `Authorization: Bearer sk_<prefix>_<secret>` on any /api/v1 request;
        the verifier resolves the token to the issuing user's role and the
        token's org. Revoke with `DELETE /api/v1/me/api-keys/{id}`. Tokens
        with a null `created_by` (e.g. legacy seeds) cannot be used for
        request auth.
    idempotencyKey:
      type: apiKey
      in: header
      name: Idempotency-Key

  schemas:
    PayrollExport:
      type: object
      description: >
        One attempt to send a payroll run to a provider. Keyed on the run's
        payable content, so a retry after a timeout — the case where you
        don't know whether the provider received it — collides rather than
        paying twice.
      properties:
        id: { type: string, format: uuid }
        provider: { type: string }
        export_state:
          type: string
          enum: [queued, sent, confirmed, partial, failed, cancelled]
          description: >
            `partial` is distinct from `failed`: some lines were accepted and
            are already paid. Retry only the rejected ones — never re-send an
            accepted line.
        attempts: { type: integer }
        external_batch_id: { type: string, nullable: true }
        line_count: { type: integer, nullable: true }
        accepted_count: { type: integer, nullable: true }
        rejected_count: { type: integer, nullable: true }
        last_error: { type: string, nullable: true }
        sent_at: { type: string, format: date-time, nullable: true }
        confirmed_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
    TimeCorrection:
      type: object
      description: >
        A worker-initiated request to correct a time entry. Filing one never
        mutates the punch; a manager decides it and the applier writes the
        entry in one transaction. `applied` is deliberately distinct from
        `approved` — approval is a decision, application is a database effect
        that can fail (e.g. the sheet was posted).
      properties:
        id: { type: string, format: uuid }
        time_entry_id:
          type: string
          format: uuid
          nullable: true
          description: Null only for `missing_entry`, where no punch exists yet.
        timesheet_id: { type: string, format: uuid, nullable: true }
        requester_id: { type: string, format: uuid }
        correction_kind:
          type: string
          enum: [edit_in, edit_out, edit_both, missing_entry, delete_entry, zone_override]
        correction_state:
          type: string
          enum: [requested, approved, denied, applied, withdrawn]
        reason: { type: string }
        original_started_at: { type: string, format: date-time, nullable: true }
        original_ended_at: { type: string, format: date-time, nullable: true }
        proposed_started_at: { type: string, format: date-time, nullable: true }
        proposed_ended_at: { type: string, format: date-time, nullable: true }
        decided_by:
          type: string
          format: uuid
          nullable: true
          description: Never equal to `requester_id` — separation of duties is enforced at the database.
        decided_at: { type: string, format: date-time, nullable: true }
        decision_notes: { type: string, nullable: true }
        applied_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
    ApiEnvelope:
      oneOf:
        - $ref: "#/components/schemas/ApiOk"
        - $ref: "#/components/schemas/ApiError"
    ApiOk:
      type: object
      required: [ok, data]
      properties:
        ok: { type: boolean, enum: [true] }
        data: {}
    ApiError:
      type: object
      required: [ok, error]
      properties:
        ok: { type: boolean, enum: [false] }
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum: [bad_request, unauthorized, forbidden, not_found, conflict, rate_limited, internal, service_unavailable]
            message: { type: string }
            details: {}

    Project:
      type: object
      required: [id, org_id, slug, name, created_at]
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        slug: { type: string, example: "mmw26-hialeah" }
        name: { type: string, example: "MMW26 Hialeah" }
        description: { type: string, nullable: true }
        start_date: { type: string, format: date, nullable: true }
        end_date: { type: string, format: date, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 120, example: "Salvage City EDCLV26" }
        description: { type: string, maxLength: 2000 }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        slug: { type: string, pattern: "^[a-z0-9-]+$", maxLength: 48 }

    PageEnvelope:
      type: object
      required: [orgId, projects, nextCursor, pageSize, totalCount]
      properties:
        orgId: { type: string, format: uuid }
        projects:
          type: array
          items: { $ref: "#/components/schemas/Project" }
        nextCursor: { type: string, nullable: true, description: "Opaque cursor; pass back as `?cursor=` to fetch the next page." }
        pageSize: { type: integer, minimum: 1, maximum: 100 }
        totalCount: { type: integer, minimum: 0 }

    ApiKey:
      type: object
      required: [id, name, prefix, scopes, created_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string, example: "ci-deploy-bot" }
        prefix: { type: string, example: "sk_a1b2c3d4", description: "Non-secret token handle (sk_ + 8 chars); safe to display." }
        scopes:
          type: array
          items: { type: string }
          example: ["projects:read"]
        last_used_at: { type: string, format: date-time, nullable: true }
        expires_at: { type: string, format: date-time, nullable: true }
        revoked_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        created_by: { type: string, format: uuid, nullable: true }

    CreateApiKeyRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 80, example: "ci-deploy-bot" }
        scopes:
          type: array
          maxItems: 32
          items: { type: string, maxLength: 64 }
          example: ["projects:read", "projects:write"]
        expiresAt: { type: string, format: date-time, description: "ISO-8601 expiry. Omit for non-expiring tokens." }

    CreateApiKeyResponse:
      type: object
      required: [key, token]
      properties:
        key: { $ref: "#/components/schemas/ApiKey" }
        token:
          type: string
          example: "sk_a1b2c3d4_x9YgQ8s-Q7QwY..."
          description: "Plaintext token. Returned ONLY once at creation — store it now."

    MarketplaceListing:
      type: object
      required: [id, org_id, seller_user_id, title, currency, listing_state, created_at]
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        seller_user_id: { type: string, format: uuid }
        title: { type: string, example: "Shure SM58 (x4)" }
        description: { type: string, nullable: true }
        price_cents: { type: integer, nullable: true, example: 24000 }
        currency: { type: string, example: "USD" }
        item_condition: { type: string, nullable: true, enum: [new, like_new, used, for_parts] }
        category: { type: string, nullable: true }
        listing_state: { type: string, enum: [draft, active, sold, withdrawn] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateMarketplaceListingRequest:
      type: object
      required: [title]
      properties:
        title: { type: string, minLength: 1, maxLength: 200, example: "Shure SM58 (x4)" }
        description: { type: string, maxLength: 8000 }
        priceCents: { type: integer, minimum: 0, example: 24000 }
        currency: { type: string, minLength: 3, maxLength: 3, example: "USD" }
        itemCondition: { type: string, enum: [new, like_new, used, for_parts] }
        category: { type: string, maxLength: 120 }
        listingState: { type: string, enum: [draft, active, sold, withdrawn] }

    Handover:
      type: object
      required: [id, org_id, post_state, summary, created_at]
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        project_id: { type: string, format: uuid, nullable: true }
        from_user_id: { type: string, format: uuid, nullable: true }
        to_user_id: { type: string, format: uuid, nullable: true }
        relief_label: { type: string, nullable: true }
        post_state: { type: string, enum: [all_clear, watch_items, issues] }
        summary: { type: string }
        open_items: { type: string, nullable: true }
        assets_passed: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateHandoverRequest:
      type: object
      required: [summary]
      properties:
        projectId: { type: string, format: uuid }
        reliefLabel: { type: string, maxLength: 200 }
        postState: { type: string, enum: [all_clear, watch_items, issues], default: all_clear }
        summary: { type: string, minLength: 1, maxLength: 8000 }
        openItems: { type: string, maxLength: 8000 }
        assetsPassed: { type: string, maxLength: 8000 }

    ShiftNote:
      type: object
      required: [id, org_id, time_entry_id, body, as_manager, created_at]
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        time_entry_id: { type: string, format: uuid }
        author_id: { type: string, format: uuid, nullable: true }
        body: { type: string }
        as_manager: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateShiftNoteRequest:
      type: object
      required: [timeEntryId, body]
      properties:
        timeEntryId: { type: string, format: uuid }
        body: { type: string, minLength: 1, maxLength: 8000 }
        asManager: { type: boolean, default: false }

    TaskComment:
      type: object
      required: [id, task_id, body, created_at]
      properties:
        id: { type: string, format: uuid }
        task_id: { type: string, format: uuid }
        author_id: { type: string, format: uuid, nullable: true }
        body: { type: string }
        mentions:
          type: array
          items: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateTaskCommentRequest:
      type: object
      required: [body]
      properties:
        body: { type: string, minLength: 1, maxLength: 8000 }
        mentions:
          type: array
          maxItems: 50
          items: { type: string, format: uuid }

    TaskEvent:
      type: object
      required: [id, task_id, event_kind, created_at]
      properties:
        id: { type: string, format: uuid }
        task_id: { type: string, format: uuid }
        event_kind: { type: string, enum: [created, state_change, assigned, comment, attachment, due_change] }
        from_state: { type: string, nullable: true }
        to_state: { type: string, nullable: true }
        actor_id: { type: string, format: uuid, nullable: true }
        body: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

  parameters:
    Cursor:
      name: cursor
      in: query
      required: false
      schema: { type: string }
      description: Opaque pagination cursor returned by the previous page's `nextCursor`.
    PageSize:
      name: pageSize
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: false
      schema: { type: string, maxLength: 256 }
      description: |
        Stripe-style idempotency. Replaying with the same key + same body
        returns the original response (with `idempotency-replay: true`).
        Replaying with the same key but a different body returns 409 conflict.

  headers:
    XRequestId:
      schema: { type: string }
      description: Server-assigned request ID; echo this when filing support tickets.
    XRateLimitRemaining:
      schema: { type: integer }
      description: Requests left in the current window.
    XRateLimitReset:
      schema: { type: integer }
      description: Unix-ms timestamp when the window resets.
    RetryAfter:
      schema: { type: integer }
      description: Seconds to wait before retrying. Sent on 429 responses.

  responses:
    Unauthorized:
      description: Missing or invalid credentials.
      content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } }
    Forbidden:
      description: Authenticated but the role/capability is insufficient.
      content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } }
    NotFound:
      description: Resource does not exist or is not visible to the caller.
      content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } }
    BadRequest:
      description: Validation failed; `error.details` contains per-field issues.
      content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } }
    Conflict:
      description: Request conflicts with current state (e.g. duplicate slug, idempotency-key reused).
      content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } }
    RateLimited:
      description: Per-bucket budget exceeded.
      headers:
        Retry-After: { $ref: "#/components/headers/RetryAfter" }
        X-RateLimit-Remaining: { $ref: "#/components/headers/XRateLimitRemaining" }
        X-RateLimit-Reset: { $ref: "#/components/headers/XRateLimitReset" }
      content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } }

paths:
  /api/v1/health:
    get:
      operationId: getHealth
      summary: Legacy composite health ping (kept for backwards compat).
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/ApiEnvelope" } } } }
  /api/v1/health/liveness:
    get:
      operationId: getHealthLiveness
      summary: Liveness probe. Always 200 if the process is up.
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/ApiEnvelope" } } } }
  /api/v1/health/readiness:
    get:
      operationId: getHealthReadiness
      summary: Readiness probe. 200 iff DB reachable + env complete.
      responses:
        "200": { description: ready, content: { application/json: { schema: { $ref: "#/components/schemas/ApiEnvelope" } } } }
        "500": { description: not ready, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }

  /api/v1/setup:
    get:
      operationId: getSetup
      summary: Org activation checklist (create project → import → invite → go live), derived live from real data.
      responses:
        "200": { description: activation progress, content: { application/json: { schema: { $ref: "#/components/schemas/ApiEnvelope" } } } }
        "401": { description: unauthorized, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/inbox:
    get:
      operationId: getInbox
      summary: Unified per-user triage inbox — unread notifications + the viewer's own not-done tasks.
      responses:
        "200": { description: inbox items, content: { application/json: { schema: { $ref: "#/components/schemas/ApiEnvelope" } } } }
        "401": { description: unauthorized, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/ai/copilot:
    post:
      operationId: postAiCopilot
      summary: Grounded Copilot answer — answers only from the org's indexed RAG corpus, with real citations + a confidence grade.
      responses:
        "200": { description: grounded answer, content: { application/json: { schema: { $ref: "#/components/schemas/ApiEnvelope" } } } }
        "401": { description: unauthorized, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }
        "503": { description: AI not configured, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/telemetry/marketing:
    post:
      operationId: postTelemetryMarketing
      summary: Anonymous marketing telemetry beacon (M3-05 / IK-039). Writes events into usage_events under the system org.
      security: []
      responses:
        "200": { description: received, content: { application/json: { schema: { $ref: "#/components/schemas/ApiEnvelope" } } } }
        "400": { description: invalid event or payload too large, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/projects:
    get:
      summary: List projects visible to the caller's org.
      operationId: listProjects
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Page of projects. `X-Total-Count` mirrors `data.totalCount`.
          headers:
            X-Total-Count:
              schema: { type: integer }
              description: Total projects in the org (not just this page).
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiOk"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/PageEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }
    post:
      summary: Create a project. Idempotent when `Idempotency-Key` is provided.
      operationId: createProject
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateProjectRequest" }
            examples:
              minimal:
                value: { name: "MMW26 Hialeah" }
              fullySpecified:
                value:
                  name: "Salvage City EDCLV26"
                  description: "Day-of-show ops for EDC LV 2026"
                  startDate: "2026-05-15"
                  endDate: "2026-05-18"
                  slug: "salvage-city-edclv26"
      responses:
        "201":
          description: Project created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiOk"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Project" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "429": { $ref: "#/components/responses/RateLimited" }
  /api/v1/projects/{projectId}:
    parameters:
      - name: projectId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: Get a project by id.
      operationId: getProject
      responses:
        "200":
          description: The project.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiOk"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Project" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "403": { $ref: "#/components/responses/Forbidden" }
    patch:
      summary: Update a project (partial).
      operationId: updateProject
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, minLength: 1, maxLength: 120 }
                description: { type: string, maxLength: 2000 }
                startDate: { type: string, format: date }
                endDate: { type: string, format: date }
      responses:
        "200":
          description: Updated project.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiOk"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Project" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/notifications/actions:
    post:
      summary: Execute an actionable-notification action (approve/decline time-off, approve deliverable). Called by the service worker on action-button tap. P2.a.
      operationId: postNotificationsActions
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/ApiEnvelope" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }
  /api/v1/scan:
    post:
      summary: Unified scan resolver. Resolves assignment codes (any catalog kind — ticket, credential, wristband, vehicle, etc.; race-safe via assignment_scan_codes unique partial index), asset tags (read-only identification), and — in pos/any mode with scan:product — retail GTINs via catalog_item_gtins, returning `result:"product"` with the matched catalog item (gtin14, displayName, matchSource) plus its open approved advance lines (openLines[] with party/project names). Unknown codes journal to scan_unknowns.
      operationId: postScan
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/ApiEnvelope" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }
  /api/v1/equipment/scan:
    post:
      summary: Scan an equipment asset tag to toggle / check-in / check-out. Emits status updates.
      operationId: postEquipmentScan
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/ApiEnvelope" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/deliverables/{id}/download:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Redirect to a signed URL for a deliverable file.
      operationId: getDeliverablesByIdDownload
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/ApiEnvelope" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/deliverables/{id}/transition:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    post:
      summary: Drive a deliverable through the advancing state machine (canonical NEXT_FULFILLMENT_STATES map, e.g. submitted → in_review → approved → delivered). Producer-side personas only.
