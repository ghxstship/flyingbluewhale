  /api/v1/documents:
    get:
      operationId: getDocuments
      summary: "List every generatable document type (id, app, OpenAPI schema name, record-binding support). Discovery entry point for the documents system. Scope: documents:read."
      responses:
        "200":
          description: Document type catalog.
          content:
            application/json:
              schema:
                type: object
                properties:
                  documents:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        app: { type: string }
                        schema: { type: string }
                        recordBinding: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/v1/documents/{docType}:
    parameters:
      - name: docType
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getDocumentsByDocType
      summary: "Machine-readable data contract for one document type — JSON Schema, sample data object, and merge-field paths. Scope: documents:read."
      responses:
        "200":
          description: Data contract for the document type.
          content:
            application/json:
              schema:
                type: object
                properties:
                  docType: { type: string }
                  schema: { type: object }
                  sample: { type: object }
                  paths: { type: array, items: { type: string } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      operationId: postDocumentsByDocType
      summary: "Generate a document. Body { data } (external — any doc type) or { recordId } (internal — record-bound types). Returns rendered .doc HTML + resolved data; no mutation. Scope: documents:write."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required: [data]
                  properties:
                    data: { type: object }
                - type: object
                  required: [recordId]
                  properties:
                    recordId: { type: string }
      responses:
        "200":
          description: Rendered document (HTML + resolved data).
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  schema: { type: string }
                  brand: { type: string }
                  html: { type: string }
                  data: { type: object }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }

