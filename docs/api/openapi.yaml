  /api/v1/me/api-keys:
    get:
      summary: List the caller's personal access tokens (never includes the secret).
      operationId: listApiKeys
      security:
        - supabaseSession: []
      responses:
        "200":
          description: All non-deleted tokens for the caller in their active org.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiOk"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [keys]
                        properties:
                          keys:
                            type: array
                            items: { $ref: "#/components/schemas/ApiKey" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      summary: Issue a new personal access token. Plaintext returned ONCE; cookie-auth only.
      operationId: createApiKey
      security:
        - supabaseSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateApiKeyRequest" }
            examples:
              ciBot:
                value:
                  name: "ci-deploy-bot"
                  scopes: ["projects:read", "projects:write"]
                  expiresAt: "2027-01-01T00:00:00Z"
      responses:
        "201":
          description: Token issued. Capture `data.token` immediately — it cannot be retrieved later.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiOk"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/CreateApiKeyResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }
  /api/v1/me/api-keys/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    delete:
      summary: Revoke a personal access token (soft-revoke; sets `revoked_at`).
      operationId: revokeApiKey
      security:
        - supabaseSession: []
      responses:
        "200":
          description: Token revoked. Subsequent requests using it return 401.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiOk"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [id, revoked]
                        properties:
                          id: { type: string, format: uuid }
                          revoked: { type: boolean, enum: [true] }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

