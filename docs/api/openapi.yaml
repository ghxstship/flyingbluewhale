      responses:
        "200":
          description: Updated listing.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiOk"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          listing: { $ref: "#/components/schemas/MarketplaceListing" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }
    delete:
      summary: "Soft-delete a marketplace listing. Scope: marketplace:write."
      operationId: deleteMarketplaceListing
      responses:
        "200":
          description: Listing soft-deleted.
          content: { application/json: { schema: { $ref: "#/components/schemas/ApiOk" } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }

