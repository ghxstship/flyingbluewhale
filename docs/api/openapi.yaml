    post:
      summary: "Open a pay period. Admin band — managers approve hours, they don't decide which week those hours belong to. Scope: payroll:post."
      operationId: createPayPeriod
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [periodStart, periodEnd]
              properties:
                periodStart: { type: string, format: date }
                periodEnd: { type: string, format: date }
      responses:
        "201": { description: The pay period. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { description: That pay period already exists. }

  /api/v1/pay-periods/{periodId}/compile:
    post:
      summary: "Gather closed punches into one timesheet per worker for the period, stamping time_entries.timesheet_id. Idempotent — safe and intended to re-run as late offline punches replay. Scope: time:approve."
      operationId: compilePayPeriod
      parameters:
        - name: periodId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: How many sheets and entries the compile touched.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          compiled:
                            type: object
                            properties:
                              sheets: { type: integer }
                              entries_linked: { type: integer }
                          message: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Pay period not found. }
        "409": { description: The period is locked or posted. }

  /api/v1/time/entries/{id}:
    patch:
      summary: "Manager punch edit. The reason is mandatory and lands on the append-only audit row. Refused on a posted timesheet — re-open it first. Scope: time:edit."
      operationId: editTimeEntry
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string, minLength: 10, maxLength: 2000 }
                startedAt: { type: string, format: date-time }
                endedAt: { type: string, format: date-time, nullable: true }
                zoneId: { type: string, format: uuid }
                clearException:
                  type: boolean
                  description: Clear a quarantined/warned geofence exception as part of the edit.
      responses:
        "200": { description: Edited, and audited. }
        "400": { description: No reason, nothing to change, or the shift would end before it starts. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Not a manager, or the entry belongs to a posted timesheet. }
        "404": { description: Time entry not found. }

  /api/v1/timesheets/{id}/post:
    post:
      summary: "Post an approved timesheet to a payroll run, computing the REG/OT/DT split under the org's ot_rule_set and writing payroll_run_lines. Admin band. Re-posting replaces that sheet's lines rather than appending. Scope: payroll:post."
      operationId: postTimesheet
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payrollRunId]
              properties:
                payrollRunId: { type: string, format: uuid }
                timeZone:
                  type: string
                  description: IANA zone the worker's days are measured in. Wrong here means wrong daily-overtime boundaries under CA rules, so it is explicit rather than guessed.
                weekStartsOn: { type: integer, minimum: 0, maximum: 6 }
      responses:
        "200":
          description: Posted, with the hour split that was written.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          result: { type: object }
                          totalHours: { type: number }
                          otRuleSet:
                            type: string
                            enum: [flsa, ca, none]
                            description: Which rules produced this split. `none` means the hours are raw and your HR system owes the overtime calculation.
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Posting is admin band. }
        "404": { description: Timesheet not found. }
        "409": { description: Not approved, no closed entries, or no payable hours. }

  /api/v1/payroll-runs/{runId}/export:
    get:
      summary: "The run's export history, newest first. Scope: payroll:read."
      operationId: listPayrollExports
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Past exports of this run.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          exports:
                            type: array
                            items: { $ref: "#/components/schemas/PayrollExport" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      summary: "Export a payroll run to a provider. Idempotent on the run's payable CONTENT: re-exporting unchanged content returns the existing export (200) and never sends twice; changing an hour mints a new export (201). Admin band. Scope: payroll:export."
      operationId: exportPayrollRun
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  type: string
                  default: csv
                  description: >
                    `csv` is the universal driver — it works with every payroll
                    system today, with no partnership or certification. Native
                    API drivers register as they clear those gates.
      responses:
        "200":
          description: >
            This exact content was already exported. The original export is
            returned and nothing was sent again — `idempotent` is true.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          export: { $ref: "#/components/schemas/PayrollExport" }
                          idempotent: { type: boolean, enum: [true] }
                          message: { type: string }
        "201":
          description: Exported. File-drop drivers return the artifact to deliver.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          export: { $ref: "#/components/schemas/PayrollExport" }
                          artifact:
                            type: object
                            nullable: true
                            properties:
                              filename: { type: string }
                              contentType: { type: string }
                              body: { type: string }
                          idempotent: { type: boolean, enum: [false] }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Exporting is admin band — approving hours and paying them are separate authorities. }
        "404": { description: Payroll run not found. }
        "422":
          description: >
            Refused before sending. Typically a worker with no
            `hr_worker_links` entry for this provider, a run with no lines, or
            a zero-hour line. A payroll import that half-works is worse than
            one that doesn't run.

  /api/v1/timesheets/{id}/submit:
    post:
      summary: "Hand a timesheet in for review (open|rejected -> submitted). The worker's own act; a manager may submit on their behalf. Refused while the sheet has corrections awaiting a decision. Scope: time:write."
      operationId: submitTimesheet
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: The submitted sheet, with its derived totals.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          timesheet:
                            type: object
                            properties:
                              id: { type: string, format: uuid }
                              state: { type: string, enum: [submitted] }
                              submitted_at: { type: string, format: date-time }
                              total_minutes: { type: integer }
                              billable_minutes: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: You can only submit your own timesheet. }
        "404": { description: Timesheet not found. }
        "409": { description: Not submittable from its current state, or corrections are still pending. }

  /api/v1/time/corrections:
    get:
      summary: "List time-correction requests. A worker sees their own; the manager band sees the org queue (pass `?mine=1` to narrow to their own). Optional `?state=` filter. Scope: time:read."
      operationId: listTimeCorrections
      parameters:
        - name: state
          in: query
          required: false
          schema: { type: string, enum: [requested, approved, denied, applied, withdrawn] }
          description: Filter by correction_state.
        - name: mine
          in: query
          required: false
          schema: { type: string, enum: ["1"] }
          description: Manager-band callers only — narrow the org queue to their own requests.
      responses:
        "200":
          description: The caller's visible correction requests.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          corrections:
                            type: array
                            items: { $ref: "#/components/schemas/TimeCorrection" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      summary: "File a time-correction request against your own punch. Never mutates the entry — it proposes a change a manager must approve. Scope: time:write."
      operationId: createTimeCorrection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kind, reason]
              properties:
                timeEntryId:
                  type: string
                  format: uuid
                  nullable: true
                  description: Required for every kind except `missing_entry`, which has no entry yet.
                kind:
                  type: string
                  enum: [edit_in, edit_out, edit_both, missing_entry, delete_entry, zone_override]
                reason:
                  type: string
                  minLength: 10
                  maxLength: 2000
                  description: What happened, in the worker's words. Enforced at the database, not just here.
                proposedStartedAt: { type: string, format: date-time, nullable: true }
                proposedEndedAt: { type: string, format: date-time, nullable: true }
                proposedZoneId: { type: string, format: uuid, nullable: true }
      responses:
        "201":
          description: The filed request. The punch is unchanged.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          correction: { $ref: "#/components/schemas/TimeCorrection" }
        "400": { description: The request shape or reason is unusable. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: You can only request corrections to your own time entries. }
        "404": { description: Time entry not found. }
        "409": { description: You already have a pending request for this shift. }

  /api/v1/time/corrections/{id}:
    patch:
      summary: "Decide a time correction. Approving applies it in the same transaction (entry mutation + audit reason + re-open of an approved timesheet). Manager band only, and never your own request. Scope: time:approve."
      operationId: decideTimeCorrection
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision: { type: string, enum: [approved, denied] }
                notes: { type: string, maxLength: 2000 }
      responses:
        "200":
          description: The applied result.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          result:
                            type: object
                            properties:
                              state: { type: string, enum: [applied, denied] }
                              reopened_timesheet:
                                type: boolean
                                description: True when applying returned an already-approved timesheet to `open`, because the hours it blessed just changed.
                              time_entry_id: { type: string, format: uuid, nullable: true }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Not a manager, or you are the requester (separation of duties). }
        "404": { description: Correction not found. }
        "409": { description: Already decided. }

