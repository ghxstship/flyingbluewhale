<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Tileable engineering grid. Uses currentColor at low opacity so it themes per surface. -->
  <defs>
    <pattern id="atlvs-grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0 H0 V48" stroke="currentColor" stroke-width="1" opacity="0.12" fill="none"></path>
      <path d="M24 0 V48 M0 24 H48" stroke="currentColor" stroke-width="0.5" opacity="0.06" fill="none"></path>
    </pattern>
  </defs>
  <rect width="48" height="48" fill="url(#atlvs-grid)"></rect>
</svg>
