<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · COMPVSS</title>
    <style>
      /* Static fallback page: token values are hardcoded because the app CSS
         is unreachable offline. Mirrors the live COMPVSS accent (#FFC400,
         v8.0 palette-locked) on the dark neutral base (#111318). */
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, sans-serif;
        background: #111318;
        color: #f2f4f8;
        text-align: center;
        padding: 24px;
      }
      main { max-width: 420px; }
      .eyebrow {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #ffc400;
        margin-bottom: 12px;
      }
      h1 { font-size: 26px; margin: 0 0 12px; line-height: 1.15; }
      p { font-size: 14px; color: #b8bdc7; margin: 0 0 20px; }
      button {
        min-height: 44px;
        min-width: 44px;
        padding: 12px 22px;
        font-size: 15px;
        font-weight: 600;
        background: #ffc400;
        color: #231a00;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">C O M P V S S</div>
      <h1>You're Offline</h1>
      <p>
        No connection right now. Clock punches and scans you already submitted are saved on this device
        and will sync automatically once you're back online. This page needs a connection to load.
      </p>
      <button onclick="location.reload()">Try Again</button>
    </main>
  </body>
</html>
